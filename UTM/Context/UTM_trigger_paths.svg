<svg viewBox="0 0 1060 664" xmlns="http://www.w3.org/2000/svg" font-family="Inter, 'Helvetica Neue', Arial, sans-serif">
<rect x="0" y="0" width="1060" height="664" fill="#ffffff"/>
<text x="28" y="42" font-size="25" font-weight="700" fill="#021936">UTM generation — three ways to trigger it</text>
<text x="28" y="66" font-size="14" fill="#5B6472">Same requirement in all three: single or multiple codes, repeatable, written to the task brief and the Excel register.</text>
<rect x="28" y="84" width="1004" height="46" rx="9" fill="#E9F0FF" stroke="#0043C4" stroke-width="1.1"/>
<text x="46" y="107" font-size="13.5" font-weight="700" fill="#0043C4">One Opal agent does the work</text>
<text x="46" y="123" font-size="12.5" fill="#021936">pre-fill · build the Swiss Re pattern · write-back · log. Same engine behind all three — only the front door differs, so no rework.</text>
<rect x="28" y="150" width="324" height="62" rx="9" fill="#ffffff" stroke="#0043C4" stroke-width="1.6"/>
<text x="44" y="177" font-size="15" font-weight="700" fill="#0043C4">Opal Chat — conversational</text>
<rect x="42" y="188" width="146.79999999999998" height="16" rx="8" fill="#E9F0FF"/>
<text x="115.39999999999999" y="199.5" font-size="9.5" font-weight="700" fill="#0043C4" text-anchor="middle">Lowest cost · at launch</text>
<rect x="368" y="150" width="324" height="62" rx="9" fill="#ffffff" stroke="#1B7A43" stroke-width="1.6"/>
<text x="384" y="177" font-size="15" font-weight="700" fill="#1B7A43">Opal Chat — guided form</text>
