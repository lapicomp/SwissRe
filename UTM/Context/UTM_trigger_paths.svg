<text x="752" y="363.0" font-size="11.5" fill="#021936">Fill fields · 1 or many codes</text>
<rect x="708" y="390" width="324" height="46" rx="7" fill="#FBEDE2" stroke="#C9D2DE" stroke-width="0.8"/>
<circle cx="732" cy="413.0" r="11.5" fill="#B4530E"/>
<text x="732" y="417.0" font-size="12" font-weight="700" fill="#fff" text-anchor="middle">4</text>
<text x="752" y="417.0" font-size="11.5" fill="#021936">Create → agent generates</text>
<rect x="708" y="444" width="324" height="46" rx="7" fill="#FBEDE2" stroke="#C9D2DE" stroke-width="0.8"/>
<circle cx="732" cy="467.0" r="11.5" fill="#B4530E"/>
<text x="732" y="471.0" font-size="12" font-weight="700" fill="#fff" text-anchor="middle">5</text>
<text x="752" y="471.0" font-size="11.5" fill="#021936">Codes → brief + register</text>
<text x="368" y="500" font-size="10" font-style="italic" fill="#5B6472">* needs Optimizely's built-in interactive tools switched on (beta)</text>
<rect x="28" y="512" width="1004" height="38" rx="9" fill="#EEF1F5"/>
<text x="530.0" y="536" font-size="13" font-weight="600" fill="#021936" text-anchor="middle">Every code lands in the task brief (all codes stacked) and the filterable Excel register in SharePoint — repeatable on any later day.</text>
