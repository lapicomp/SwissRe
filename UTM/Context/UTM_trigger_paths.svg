<circle cx="732" cy="305.0" r="11.5" fill="#B4530E"/>
<text x="732" y="309.0" font-size="12" font-weight="700" fill="#fff" text-anchor="middle">2</text>
<text x="752" y="309.0" font-size="11.5" fill="#021936">Form opens, pre-filled</text>
<rect x="708" y="336" width="324" height="46" rx="7" fill="#FBEDE2" stroke="#C9D2DE" stroke-width="0.8"/>
<circle cx="732" cy="359.0" r="11.5" fill="#B4530E"/>
