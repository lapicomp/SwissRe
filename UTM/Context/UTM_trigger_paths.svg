<circle cx="392" cy="305.0" r="11.5" fill="#1B7A43"/>
<text x="392" y="309.0" font-size="12" font-weight="700" fill="#fff" text-anchor="middle">2</text>
<text x="412" y="302.0" font-size="11.5" fill="#021936">Agent shows a form with</text>
<text x="412" y="316.0" font-size="11.5" fill="#021936">dropdowns</text>
<rect x="368" y="336" width="324" height="46" rx="7" fill="#E7F5EC" stroke="#C9D2DE" stroke-width="0.8"/>
<circle cx="392" cy="359.0" r="11.5" fill="#1B7A43"/>
<text x="392" y="363.0" font-size="12" font-weight="700" fill="#fff" text-anchor="middle">3</text>
<text x="412" y="356.0" font-size="11.5" fill="#021936">Detects your task, pre-fills</text>
<text x="412" y="370.0" font-size="11.5" fill="#021936">fields</text>
